name: Release

# Crea una Release de GitHub al hacer push de un tag v* (p. ej. v1.0.0).
# Compila el launcher self-contained para Windows (RID win-x86: corre en x86 y x64, y embebe
# los parches AIR de Windows que el .csproj solo incluye con win-x86/Debug) y adjunta el zip.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write       # necesario para crear la Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # MSBuild Version exige x.y.z (sin la 'v' del tag). Derivamos la versión numérica.
      - name: Derive version
        id: ver
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?(\.[0-9]+)?$ ]]; then ver="1.0.0"; fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      # Single-file para que el .exe sea autónomo (se pueda subir y ejecutar suelto).
      - name: Publish (win-x86, single-file, self-contained)
        shell: pwsh
        run: >
          dotnet publish HabboCustomLauncher.csproj
          -c Release -r win-x86 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      - name: Prepare artifacts (.exe + .zip)
        shell: pwsh
        run: |
          Copy-Item publish/HabboCustomLauncher.exe "HFA-Launcher-${{ github.ref_name }}-win-x86.exe" -Force
          Compress-Archive -Path publish/* -DestinationPath "HFA-Launcher-${{ github.ref_name }}-win-x86.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HFA-Launcher-*-win-x86.exe
            HFA-Launcher-*-win-x86.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
